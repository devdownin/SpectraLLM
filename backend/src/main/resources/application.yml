spring:
  application:
    name: spectra-api
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: jdbc:h2:file:./data/spectra-db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate   # schema.sql gère la création ; validate détecte les dérives en prod
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: always         # exécute schema.sql au démarrage (idempotent : CREATE TABLE IF NOT EXISTS)
  h2:
    console:
      enabled: false
  # Arrêt gracieux : laisse les requêtes/ingestions en cours se terminer au SIGTERM
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

# Services externes
spectra:
  llm:
    base-url: ${SPECTRA_LLM_BASE_URL:http://llm-chat:8081}
    model: ${SPECTRA_LLM_MODEL:phi-4-mini}
    embedding-model: ${SPECTRA_LLM_EMBEDDING_MODEL:nomic-embed-text}
    provider: ${SPECTRA_LLM_PROVIDER:llama-cpp}
    chat:
      base-url: ${SPECTRA_LLM_CHAT_BASE_URL:http://llm-chat:8081}
      # Fichier GGUF servi par llm-chat (relatif au répertoire des modèles partagé).
      # Renseigné, il donne au registre local la source réelle du modèle par défaut.
      file: ${SPECTRA_LLM_CHAT_FILE:}
    embedding:
      base-url: ${SPECTRA_LLM_EMBEDDING_BASE_URL:http://llm-embed:8082}
      # Fichier GGUF servi par llm-embed (même volume partagé).
      file: ${SPECTRA_LLM_EMBEDDING_FILE:}
    # Bascule du modèle actif par les harnais d'évaluation (ModelSwitchCoordinator) :
    # attente que llama-server serve RÉELLEMENT le modèle demandé avant de mesurer.
    # En mode conteneurs séparés, llm-chat suit le pointeur du registre (~10 s) puis
    # recharge le modèle — le timeout doit couvrir le chargement du GGUF le plus lourd.
    switch:
      convergence-timeout-seconds: ${SPECTRA_LLM_SWITCH_TIMEOUT:300}
      poll-interval-millis: ${SPECTRA_LLM_SWITCH_POLL_MS:2000}
  evaluation:
    # Modèle-juge neutre pour l'évaluation LLM-as-a-judge (EvaluationService,
    # QualityBenchmarkService et RagAblationService). Vide = le modèle évalué se juge
    # lui-même (biais possible). Renseigner un modèle distinct et fixe rend
    # la comparaison multi-modèles plus équitable (évaluation en 2 phases :
    # génération avec le modèle évalué, puis notation avec le juge).
    judge-model: ${SPECTRA_EVALUATION_JUDGE_MODEL:}
    # Nombre maximal de rapports d'évaluation COMPLETED conservés (les plus anciens
    # sont évincés). Les rapports sont nécessaires aux comparaisons.
    max-completed-reports: ${SPECTRA_EVALUATION_MAX_COMPLETED_REPORTS:200}
  chromadb:
    base-url: ${CHROMADB_URL:http://chromadb:8000}
  ingestion:
    browserless-url: ${SPECTRA_INGESTION_BROWSERLESS_URL:http://browserless:3000}
    max-zip-entries: ${SPECTRA_INGESTION_MAX_ZIP_ENTRIES:10000}
    max-entry-bytes: ${SPECTRA_INGESTION_MAX_ENTRY_BYTES:52428800} # 50MB
  # Ingestion streaming Kafka — enrichit le RAG au fil de l'eau (données vivantes).
  # Désactivé par défaut : aucun bean Kafka n'est créé, aucune connexion à un broker.
  kafka:
    enabled: ${SPECTRA_KAFKA_ENABLED:false}
    bootstrap-servers: ${SPECTRA_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topics: ${SPECTRA_KAFKA_TOPICS:}          # liste séparée par des virgules
    group-id: ${SPECTRA_KAFKA_GROUP_ID:spectra-ingestion}
    collection: ${SPECTRA_KAFKA_COLLECTION:spectra_stream}
    format: ${SPECTRA_KAFKA_FORMAT:json}      # extension de routage : json|txt|xml|avro
    content-field: ${SPECTRA_KAFKA_CONTENT_FIELD:}   # (JSON) champ à indexer ; vide = payload brut
    metadata-fields: ${SPECTRA_KAFKA_METADATA_FIELDS:} # (JSON) champs recopiés en métadonnées (virgules)
    concurrency: ${SPECTRA_KAFKA_CONCURRENCY:1}
    max-poll-records: ${SPECTRA_KAFKA_MAX_POLL_RECORDS:20}
    retention-ttl-days: ${SPECTRA_KAFKA_RETENTION_TTL_DAYS:0} # 0 = désactivé
    retention-cron: ${SPECTRA_KAFKA_RETENTION_CRON:0 30 3 * * *} # purge nocturne des sources périmées
    security-protocol: ${SPECTRA_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl-mechanism: ${SPECTRA_KAFKA_SASL_MECHANISM:}
    sasl-jaas-config: ${SPECTRA_KAFKA_SASL_JAAS_CONFIG:}
  pipeline:
    chunk-max-tokens: ${SPECTRA_CHUNK_MAX_TOKENS:512}
    chunk-overlap-tokens: ${SPECTRA_CHUNK_OVERLAP_TOKENS:64}
    embedding-batch-size: ${SPECTRA_EMBEDDING_BATCH_SIZE:10}
    # Taille décompressée max par fichier / entrée ZIP (Mo). Borne la mémoire
    # d'ingestion. 0 = auto : calculé selon le heap JVM et la concurrence.
    max-uncompressed-mb: ${SPECTRA_MAX_UNCOMPRESSED_MB:0}
    embedding-timeout-seconds: ${SPECTRA_EMBEDDING_TIMEOUT:30}
    generation-timeout-seconds: ${SPECTRA_GENERATION_TIMEOUT:120}
    concurrent-ingestions: ${SPECTRA_CONCURRENT_INGESTIONS:1}
  layout-parser:
    enabled: ${SPECTRA_LAYOUT_PARSER_ENABLED:false}
    base-url: ${SPECTRA_LAYOUT_PARSER_URL:http://docparser:8001}
    timeout-seconds: ${SPECTRA_LAYOUT_PARSER_TIMEOUT:120}
    buffer-size-mb: ${SPECTRA_LAYOUT_PARSER_BUFFER_MB:100}
  hybrid-search:
    enabled: ${SPECTRA_HYBRID_SEARCH_ENABLED:false}
    top-bm25: ${SPECTRA_HYBRID_BM25_TOP:20}
    bm25-weight: ${SPECTRA_HYBRID_BM25_WEIGHT:1.0}
  reranker:
    enabled: ${SPECTRA_RERANKER_ENABLED:false}
    base-url: ${SPECTRA_RERANKER_URL:http://reranker:8000}
    model: ${SPECTRA_RERANKER_MODEL:cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
    timeout-seconds: ${SPECTRA_RERANKER_TIMEOUT:30}
    top-candidates: ${SPECTRA_RERANKER_TOP_CANDIDATES:20}
  agentic-rag:
    enabled: ${SPECTRA_AGENTIC_RAG_ENABLED:false}
    max-iterations: ${SPECTRA_AGENTIC_MAX_ITERATIONS:3}
    initial-top-k: ${SPECTRA_AGENTIC_INITIAL_TOP_K:5}
    response-language: ${SPECTRA_AGENTIC_LANGUAGE:fr}
    max-context-tokens: ${SPECTRA_AGENTIC_MAX_CONTEXT_TOKENS:3000}
  conversational-rag:
    enabled: ${SPECTRA_CONVERSATIONAL_RAG_ENABLED:false}
  corrective-rag:
    enabled: ${SPECTRA_CORRECTIVE_RAG_ENABLED:false}
    min-relevant-chunks: ${SPECTRA_CORRECTIVE_MIN_RELEVANT_CHUNKS:1}
  adaptive-rag:
    enabled: ${SPECTRA_ADAPTIVE_RAG_ENABLED:false}
  self-rag:
    enabled: ${SPECTRA_SELF_RAG_ENABLED:false}
    max-reflection-iterations: ${SPECTRA_SELF_RAG_MAX_REFLECTIONS:1}
  context-compression:
    enabled: ${SPECTRA_CONTEXT_COMPRESSION_ENABLED:false}
  multi-query:
    enabled: ${SPECTRA_MULTI_QUERY_ENABLED:false}
    query-count: ${SPECTRA_MULTI_QUERY_COUNT:2}
  semantic-dedup:
    enabled: ${SPECTRA_SEMANTIC_DEDUP_ENABLED:false}
    similarity-threshold: ${SPECTRA_SEMANTIC_DEDUP_THRESHOLD:0.85}
  long-context-rag:
    enabled: ${SPECTRA_LONG_CONTEXT_RAG_ENABLED:false}
    max-collection-chunks: ${SPECTRA_LONG_CONTEXT_MAX_CHUNKS:100}
  dataset:
    dir: ./data/dataset
    # Génère un exemple de refus (« je ne sais pas ») toutes les N portions (0 = désactivé).
    # ~1 négatif pour 3 chunks ≈ 10 % du dataset, pour apprendre l'abstention (anti-hallucination).
    refusal-every-n: 3
  fine-tuning:
    work-dir: ./data/fine-tuning
    script: ./scripts/train.sh
    # Modèle de base par défaut quand la requête n'en précise pas : un alias du
    # catalogue base_models.json (tinyllama, phi3, mistral, llama3) ou un repo
    # HuggingFace complet (« org/nom »). NB : un GGUF du registre local n'est pas
    # ré-entraînable, seuls des poids HuggingFace le sont.
    default-base-model: ${SPECTRA_FINE_TUNING_DEFAULT_BASE_MODEL:phi3}
    # Catégories/types exclus du SFT (séparés par des virgules ; comparés à 'category' ET 'type').
    # Stratégie « fine-tuning vs RAG » : le fine-tuning encode mal les faits volatils et vieillit ;
    # laissez les faits changeants au RAG et réservez le SFT au style/format/procédure.
    # Exemple recommandé pour des faits volatils : "evenements,nomenclatures".
    # Vide = aucune exclusion (comportement par défaut).
    sft-excluded-categories: ""
  benchmark:
    # Fichier JSONL du benchmark qualité tenu à l'écart. Vide = ressource embarquée
    # (benchmarks/highway_benchmark.jsonl). À pointer vers un fichier curé pour votre corpus.
    quality-file:
  ged:
    archive-dir: ${SPECTRA_GED_ARCHIVE_DIR:./data/archive}
    auto-qualify-threshold: ${SPECTRA_GED_AUTO_QUALIFY_THRESHOLD:0.0}
    retention:
      archive-after-days: ${SPECTRA_GED_ARCHIVE_AFTER_DAYS:0}
      purge-after-days: ${SPECTRA_GED_PURGE_AFTER_DAYS:0}

llmfit:
  path: ${LLMFIT_PATH:llmfit}
  # Target directory for downloaded models — must match the volume shared with llm-chat.
  # In Docker: spectra-api mounts ./data:/app/data, llm-chat mounts ./data/models:/models
  # → set to ./data/models so both containers see the same files.
  models-dir: ${LLMFIT_MODELS_DIR:./data/models}
  # llmfit's own download cache. Inventoried by the storage report and purgeable of
  # its duplicates (files whose name AND size match a GGUF already in models-dir).
  # Point it to wherever your llmfit build actually caches downloads.
  cache-dir: ${LLMFIT_CACHE_DIR:${user.home}/.llmfit}
  # Retention of the Model Hub installation history: terminal jobs
  # (COMPLETED/FAILED/CANCELLED) older than this many days are purged nightly.
  # 0 (default) = keep forever — same convention as the GED and Kafka retentions.
  installations-retention-days: ${LLMFIT_INSTALL_RETENTION_DAYS:0}

resilience4j:
  circuitbreaker:
    # CircuitBreaker en aspect externe (ordre > retry) : les retries s'exécutent
    # à l'intérieur, sur l'exception transitoire brute, avant le fallback du CB.
    circuit-breaker-aspect-order: 2
    instances:
      chroma:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
        # Une incohérence embedding ↔ index est une erreur de configuration, pas une
        # panne ChromaDB : elle ne doit pas ouvrir le circuit.
        ignore-exceptions:
          - fr.spectra.service.ChromaDbClient$EmbeddingModelMismatchException
      embed:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
  # Retries sur appels idempotents (lecture) — absorbe les défaillances transitoires
  # avant que le circuit breaker ne s'ouvre. Backoff exponentiel + jitter.
  retry:
    retry-aspect-order: 1
    instances:
      chroma:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
      embed:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      # Groupes liveness/readiness : la liveness ne doit PAS dépendre d'indicateurs
      # externes/diskSpace (évite les redémarrages en cascade).
      probes:
        enabled: true
logging:
  level:
    fr.spectra: INFO
    org.springframework: INFO
  metrics:
    distribution:
      # Histogrammes (percentiles calculés côté Prometheus via histogram_quantile)
      # pour les requêtes HTTP et les requêtes RAG → tableaux de bord latence + SLO.
      percentiles-histogram:
        http.server.requests: true
        spectra.rag.query: true
      slo:
        http.server.requests: 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
