server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aligné sur spring.servlet.multipart.max-request-size (50 MB)
    client_max_body_size 50m;

    # SSE streams — buffering désactivé obligatoire
    location /api/sse/ {
        proxy_pass http://spectra-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Model Hub download progress (SSE) — same anti-buffering settings
    # Must be declared before the generic /api/ block (more specific wins)
    location = /api/models/hub/install/progress {
        proxy_pass http://spectra-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Proxy REST API vers le backend
    location /api/ {
        proxy_pass http://spectra-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SPA fallback — toutes les routes React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
