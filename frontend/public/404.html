<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spectra | AI Architect</title>
    <!--
      GitHub Pages SPA redirect — rafgraph/spa-github-pages technique.
      When GitHub Pages serves this 404.html for any deep-link route, we
      encode the original path into the query string and redirect to the
      repo root so that index.html (and the React app) can reconstruct it.
      pathSegmentsToKeep=1 preserves the /SpectraLLM/ prefix.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
