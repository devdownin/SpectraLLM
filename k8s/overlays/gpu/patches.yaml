# ── ConfigMap chat : offload toutes les couches sur GPU (override du défaut CPU "0") ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-chat-config
  namespace: spectra
data:
  LLAMA_NGL: "-1"   # -1 = toutes les couches sur GPU
---
# ── Déploiement chat : demande 1 GPU + toleration des nœuds GPU ──────────────
# (strategic merge : n'ajoute que nvidia.com/gpu, conserve cpu/memory existants)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp-chat
  namespace: spectra
spec:
  template:
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: llama-cpp-chat
          resources:
            limits:
              nvidia.com/gpu: "1"

