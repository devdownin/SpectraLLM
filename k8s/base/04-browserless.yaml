apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless
  namespace: spectra
  labels:
    app: browserless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browserless
  template:
    metadata:
      labels:
        app: browserless
    spec:
      containers:
        - name: browserless
          image: browserless/chrome:latest
          ports:
            - containerPort: 3000
          env:
            - name: MAX_CONCURRENT_SESSIONS
              value: "3"
            - name: MAX_QUEUE_LENGTH
              value: "10"
            - name: DEFAULT_LAUNCH_ARGS
              value: '["--no-sandbox","--disable-setuid-sandbox"]'
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          # browserless ne fournit pas de healthcheck HTTP simple
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: browserless
  namespace: spectra
spec:
  selector:
    app: browserless
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
