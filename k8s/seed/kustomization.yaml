apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: spectra

# Namespace + PVC (depuis la base) + Job de seeding, dans cet ordre.
# `kubectl apply -k k8s/seed` crée les volumes vides puis lance le téléchargement.
resources:
  - ../base/00-namespace.yaml
  - ../base/02-pvc.yaml
  - seed-models.yaml
