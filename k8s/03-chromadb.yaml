apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: spectra
  labels:
    app: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  strategy:
    type: Recreate   # RWO — un seul pod à la fois peut écrire
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          volumeMounts:
            - name: chromadb-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: chromadb-data
          persistentVolumeClaim:
            claimName: chromadb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: spectra
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000
  # ClusterIP — non exposé hors du cluster
  type: ClusterIP
