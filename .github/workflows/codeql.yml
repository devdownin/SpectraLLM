name: "CodeQL"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin', 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 21
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    # Manual build for Java to ensure JDK 21 is used and avoid autobuild issues
    - name: Build Java
      if: matrix.language == 'java-kotlin'
      run: mvn -B package -DskipTests

    # Autobuild for other languages (like javascript-typescript)
    - name: Autobuild
      if: matrix.language != 'java-kotlin'
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        # upload: false is used here to avoid CI failure if "GitHub Code Scanning" is not explicitly enabled in the repo settings.
        # Set to true once the feature is enabled to see results in the Security tab.
        upload: false
