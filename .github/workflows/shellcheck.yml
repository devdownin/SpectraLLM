# Lint statique des scripts shell (scripts/*.sh) avec shellcheck.
# Introduit au niveau `error` : on attrape les vrais bugs (variables non définies,
# directives invalides, redirections cassées…) sans échouer sur les avertissements
# de style pré-existants. Le seuil pourra être resserré à `warning` plus tard, une
# fois les avertissements résiduels traités.
name: Shellcheck

on:
  push:
    branches: [main]
    paths: ["scripts/**.sh", ".github/workflows/shellcheck.yml"]
  pull_request:
    paths: ["scripts/**.sh", ".github/workflows/shellcheck.yml"]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck (severity=error)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --version
          shellcheck -S error scripts/*.sh
