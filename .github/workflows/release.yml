name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.6)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to tag (default: HEAD of this branch)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name and target SHA
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            SHA="${{ inputs.commit_sha }}"
            echo "sha=${SHA:-$GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.sha }}" \
            -m "SpectraLLM ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Resolve release notes
        id: notes
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if [ -n "${{ steps.notes.outputs.path }}" ]; then
            gh release create "$TAG" \
              --title "SpectraLLM $TAG" \
              --notes-file "${{ steps.notes.outputs.path }}"
          else
            gh release create "$TAG" \
              --title "SpectraLLM $TAG" \
              --generate-notes
          fi
