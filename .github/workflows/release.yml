name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.6)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to tag (default: HEAD of this branch)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name and target SHA
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            SHA="${{ inputs.commit_sha }}"
            echo "sha=${SHA:-$GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      # Garde-fou : le tag DOIT commencer par « v » (v0.7, v0.7.1…). C'est la convention de
      # release-drafter (tag-template: v$RESOLVED_VERSION) ET la clé de résolution des notes
      # curées (.github/release-notes/vX.Y.Z.md). Un tag sans « v » (ex. « 0.7 ») ne matche pas
      # le trigger `tags: v*`, contourne silencieusement le fichier de notes et produit une
      # release au corps générique — c'est précisément ce qui est arrivé à la 0.7.
      - name: Validate tag format
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]'; then
            echo "::error::Tag '$TAG' invalide — doit commencer par 'v' (ex. v0.7.1) pour matcher le trigger tags:v* et charger .github/release-notes/$TAG.md."
            exit 1
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.sha }}" \
            -m "SpectraLLM ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Resolve release notes
        id: notes
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Aucune note curée $NOTES_FILE — repli sur --generate-notes (corps générique). Ajoutez le fichier pour une release soignée."
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if [ -n "${{ steps.notes.outputs.path }}" ]; then
            gh release create "$TAG" \
              --title "SpectraLLM $TAG" \
              --notes-file "${{ steps.notes.outputs.path }}"
          else
            gh release create "$TAG" \
              --title "SpectraLLM $TAG" \
              --generate-notes
          fi
