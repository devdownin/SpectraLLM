name: Deploy to GKE

# Déploiement automatique de la stack Spectra sur Google Kubernetes Engine.
#
# Authentification : Workload Identity Federation (OIDC, sans clé JSON).
#
# Tout est scopé à l'environnement GitHub "Cloud".
#
# ── Secrets (Settings → Environments → Cloud → Secrets) ───────────
#   GCP_WIF_PROVIDER    Nom complet du provider WIF :
#                       projects/<N>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_SERVICE_ACCOUNT Email du service account déployeur :
#                       deployer@<project>.iam.gserviceaccount.com
#
# ── Variables (Settings → Environments → Cloud → Variables) ───────
#   GCP_PROJECT_ID, GCP_REGION, GAR_REPOSITORY, GKE_CLUSTER, GKE_LOCATION
#     (valeurs non sensibles → variables, pas secrets)
#
# Voir docs/DEPLOY_GKE.md pour la procédure complète de configuration GCP.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # requis pour l'échange de jeton OIDC (Workload Identity Federation)

# Un seul déploiement à la fois ; un nouveau push annule le run en cours.
concurrency:
  group: deploy-gke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build images & deploy to GKE
    runs-on: ubuntu-latest

    # Require the environment so that environment-scoped secrets are injected
    environment: Cloud

    # Non-sensitive config comes from environment variables (vars.*),
    # auth secrets from secrets.* — both are injected because the job uses
    # the "Cloud" environment.
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_LOCATION: ${{ vars.GCP_REGION }}
      REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Validate required Workload Identity Federation secrets
      - name: Validate GCP secrets
        run: |
          set -euo pipefail
          # Secrets are injected by Actions when the job uses the environment
          WIF="${{ secrets.GCP_WIF_PROVIDER }}"
          SA="${{ secrets.GCP_SERVICE_ACCOUNT }}"

          if [ -z "$WIF" ] || [ -z "$SA" ]; then
            echo "ERROR: Workload Identity Federation secrets missing." >&2
            echo "  Set GCP_WIF_PROVIDER and GCP_SERVICE_ACCOUNT in the 'Cloud' environment." >&2
            exit 1
          fi
          echo "Using Workload Identity Federation (WIF) for GCP authentication."

      # Authenticate using Workload Identity Federation (OIDC, no JSON key)
      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth-wif
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet
      # ── Build & push des images (api, frontend, llama.cpp) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & load spectra-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          load: true
          tags: spectra-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & load spectra-frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: spectra-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & load spectra-llama-cpp
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.llama
          load: true
          tags: spectra-llama-cpp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scan des images avec Trivy ──────────────────
      - name: Cache Trivy vulnerability database
        uses: actions/cache@v4
        with:
          path: .trivycache/
          key: ${{ runner.os }}-trivy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: Run Trivy vulnerability scanner on api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spectra-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_CACHE_DIR: .trivycache/

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spectra-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_CACHE_DIR: .trivycache/

      - name: Run Trivy vulnerability scanner on llama-cpp
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spectra-llama-cpp:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_CACHE_DIR: .trivycache/

      # ── Push des images ──────────────────
      - name: Tag and push spectra-api
        run: |
          docker tag spectra-api:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:${{ steps.tag.outputs.sha }}
          docker tag spectra-api:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:latest
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:${{ steps.tag.outputs.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:latest

      - name: Tag and push spectra-frontend
        run: |
          docker tag spectra-frontend:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:${{ steps.tag.outputs.sha }}
          docker tag spectra-frontend:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:latest
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:${{ steps.tag.outputs.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:latest

      - name: Tag and push spectra-llama-cpp
        run: |
          docker tag spectra-llama-cpp:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:${{ steps.tag.outputs.sha }}
          docker tag spectra-llama-cpp:latest ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:latest
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:${{ steps.tag.outputs.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:latest

      # ── Déploiement sur GKE ─────────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Set images & apply manifests
        run: |
          set -euo pipefail
          IMG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}"
          TAG="${{ steps.tag.outputs.sha }}"
          cd deploy/k8s/base
          kustomize edit set image \
            "spectra-api=${IMG}/spectra-api:${TAG}" \
            "spectra-frontend=${IMG}/spectra-frontend:${TAG}" \
            "spectra-llama-cpp=${IMG}/spectra-llama-cpp:${TAG}"
          kubectl apply -k .

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          # Les serveurs llama chargent le modèle GGUF (1–5 min) → timeout généreux.
          kubectl -n spectra rollout status deployment/llama-cpp-embed  --timeout=600s
          kubectl -n spectra rollout status deployment/llama-cpp-chat   --timeout=900s
          kubectl -n spectra rollout status deployment/spectra-api      --timeout=600s
          kubectl -n spectra rollout status deployment/spectra-frontend --timeout=300s
