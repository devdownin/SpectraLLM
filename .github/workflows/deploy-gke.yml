name: Deploy to GKE

# Déploiement automatique de la stack Spectra sur Google Kubernetes Engine.
#
# Authentification : Workload Identity Federation (sans clé JSON) ou fallback via clé JSON.
#
# ── Secrets requis (Settings → Environments → Cloud → Secrets) ─────
#   GCP_WIF_PROVIDER    Nom complet du provider WIF :
#                       projects/<N>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_SERVICE_ACCOUNT Email du service account déployeur :
#                       deployer@<project>.iam.gserviceaccount.com
#   GCP_CREDENTIALS_JSON  (optional fallback) JSON key of the service account
#   GCP_PROJECT_ID, GCP_REGION, GAR_REPOSITORY, GKE_CLUSTER, GKE_LOCATION
#     (ces valeurs peuvent aussi être stockées comme secrets dans l'environnement "Cloud")
#
# Voir docs/DEPLOY_GKE.md pour la procédure complète de configuration GCP.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # requis pour l'échange de jeton OIDC (Workload Identity Federation)

jobs:
  deploy:
    name: Build images & deploy to GKE
    runs-on: ubuntu-latest

    # Require the environment so that environment-scoped secrets are injected
    environment: Cloud

    # Job-level env must read from environment secrets (they are not available at workflow root env)
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GAR_LOCATION: ${{ secrets.GCP_REGION }}
      REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
      GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
      GKE_LOCATION: ${{ secrets.GKE_LOCATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Validate GCP secrets and choose auth method (wif preferred, else credentials_json)
      - name: Validate GCP secrets
        id: gcp-validate
        run: |
          set -euo pipefail
          # Secrets are injected by Actions when the job uses the environment
          WIF="${{ secrets.GCP_WIF_PROVIDER }}"
          CRED="${{ secrets.GCP_CREDENTIALS_JSON }}"
          SA="${{ secrets.GCP_SERVICE_ACCOUNT }}"

          if [ -n "$WIF" ]; then
            if [ -z "$SA" ]; then
              echo "ERROR: GCP_WIF_PROVIDER is set but GCP_SERVICE_ACCOUNT is missing." >&2
              exit 1
            fi
            echo "auth_method=wif" >> "$GITHUB_OUTPUT"
            echo "Using Workload Identity Federation (WIF) for GCP authentication."
          elif [ -n "$CRED" ]; then
            echo "auth_method=creds" >> "$GITHUB_OUTPUT"
            echo "Using credentials_json fallback for GCP authentication."
          else
            echo "ERROR: No GCP authentication secrets found. Set either:" >&2
            echo "  - GCP_WIF_PROVIDER and GCP_SERVICE_ACCOUNT (recommended), or" >&2
            echo "  - GCP_CREDENTIALS_JSON (service account JSON key)" >&2
            exit 1
          fi

      # Authenticate using Workload Identity Federation (runs only if chosen)
      - name: Authenticate to Google Cloud (Workload Identity)
        if: steps.gcp-validate.outputs.auth_method == 'wif'
        id: auth-wif
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      # ── Build & push des images (api, frontend, llama.cpp) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push spectra-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:${{ steps.tag.outputs.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push spectra-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:${{ steps.tag.outputs.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push spectra-llama-cpp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.llama
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:${{ steps.tag.outputs.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/spectra-llama-cpp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Déploiement sur GKE ─────────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Set images & apply manifests
        run: |
          set -euo pipefail
          IMG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}"
          TAG="${{ steps.tag.outputs.sha }}"
          cd k8s
          kustomize edit set image \
            "spectra-api=${IMG}/spectra-api:${TAG}" \
            "spectra-frontend=${IMG}/spectra-frontend:${TAG}" \
            "spectra-llama-cpp=${IMG}/spectra-llama-cpp:${TAG}"
          kubectl apply -k .

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          kubectl -n spectra rollout status deployment/spectra-api      --timeout=600s
          kubectl -n spectra rollout status deployment/spectra-frontend --timeout=300s
