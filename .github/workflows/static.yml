name: Deploy site (promo + app) to GitHub Pages

# Assemble un artefact Pages unique :
#   /SpectraLLM/        → site promotionnel statique (dossier website/)
#   /SpectraLLM/app/    → interface React (build Vite du dossier frontend/)
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite app (servi sous /SpectraLLM/app/)
        working-directory: frontend
        env:
          VITE_BASE_PATH: /SpectraLLM/app/
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/app
          # Site promotionnel à la racine
          cp -r website/. _site/
          # Interface React sous /app/
          cp -r frontend/dist/. _site/app/
          # Désactive le traitement Jekyll (sert les fichiers tels quels)
          touch _site/.nojekyll
          echo "── Contenu de _site ──"
          find _site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
