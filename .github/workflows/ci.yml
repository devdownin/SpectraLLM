name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build and Test with Maven
      run: mvn -B package --file pom.xml

  static-analysis:
    name: Static analysis (SpotBugs)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    # SpotBugs + find-sec-bugs, restricted to a curated high-confidence rule set
    # (see spotbugs-include.xml) plus all security findings. Runs off the default
    # build via the `static-analysis` profile so `mvn package` stays fast.
    - name: SpotBugs check
      run: mvn -B -Pstatic-analysis -DskipTests compile spotbugs:check --file pom.xml
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: target/spotbugs*
        if-no-files-found: ignore

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v7
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint (ESLint)
      run: npm run lint
    - name: Unit tests (Vitest)
      run: npm run test
    - name: Build (tsc + vite)
      run: npm run build
    - name: E2E tests (Playwright)
      run: |
        npm install -g playwright
        npm install playwright core-js
        npx playwright install --with-deps chromium
        npm run preview &
        sleep 5
        node ../test_pw.js

  python-services:
    name: Python services (docparser, reranker)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: requirements-test.txt
    - name: Install test dependencies
      run: pip install -r requirements-test.txt
    - name: Lint (Ruff)
      run: ruff check docparser reranker
    - name: Unit tests (pytest)
      run: |
        (cd docparser && python -m pytest tests/ -q)
        (cd reranker && python -m pytest tests/ -q)
