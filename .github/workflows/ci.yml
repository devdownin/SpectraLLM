name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Java and Maven
      uses: ./.github/actions/setup-java-maven
    - name: Build and Test with Maven
      run: mvn -B package -f backend/pom.xml
    - name: Upload Jacoco Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: backend/target/site/jacoco/jacoco.xml

  static-analysis:
    name: Static analysis (SpotBugs)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Java and Maven
      uses: ./.github/actions/setup-java-maven
    # SpotBugs + find-sec-bugs, restricted to a curated high-confidence rule set
    # (see spotbugs-include.xml) plus all security findings. Runs off the default
    # build via the `static-analysis` profile so `mvn package` stays fast.
    - name: SpotBugs check
      run: mvn -B -Pstatic-analysis -DskipTests compile spotbugs:check -f backend/pom.xml
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: backend/target/spotbugs*
        if-no-files-found: ignore

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint (ESLint)
      run: npm run lint
    - name: Unit tests (Vitest)
      run: npm run test:coverage
    - name: Upload Vitest Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: vitest-coverage-report
        path: frontend/coverage/lcov.info
    - name: Build (tsc + vite)
      run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # La stack exige les GGUF (model-init échoue sinon et llm-chat/llm-embed ne
    # démarrent jamais) : on télécharge les modèles PAR DÉFAUT du projet, mis en
    # cache entre les runs (~1,2 Go au premier passage seulement).
    - name: Cache GGUF models
      uses: actions/cache@v6
      with:
        path: data/models
        key: e2e-gguf-phi4mini-ud-iq1s-nomic-q4km
    - name: Download default GGUF models (cache miss only)
      run: |
        mkdir -p data/models
        [ -f data/models/embed.gguf ] || curl -sSL --fail --retry 3 \
          "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5.Q4_K_M.gguf" \
          -o data/models/embed.gguf
        [ -f data/models/Phi-4-mini-reasoning-UD-IQ1_S.gguf ] || curl -sSL --fail --retry 3 \
          "https://huggingface.co/unsloth/Phi-4-mini-reasoning-GGUF/resolve/main/Phi-4-mini-reasoning-UD-IQ1_S.gguf" \
          -o data/models/Phi-4-mini-reasoning-UD-IQ1_S.gguf
        ls -lh data/models/
    # spectra-api tourne en utilisateur système « spectra » (uid ≠ runner) et monte
    # ./data:/app/data : sans droits d'écriture pour autrui, Logback ne peut pas
    # créer data/logs/ et l'API meurt au boot. Miroir des répertoires de setup.sh.
    - name: Prepare writable data directories
      run: |
        mkdir -p data/documents data/dataset data/fine-tuning/merged data/source data/logs
        chmod -R a+rwX data
    - name: Set up Docker Compose
      run: |
        docker compose --project-directory . -f deploy/docker/docker-compose.yml build
        docker compose --project-directory . -f deploy/docker/docker-compose.yml up -d
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Wait for services to be ready
      run: |
        npm install -g wait-on
        wait-on http://localhost:80 http://localhost:8080/actuator/health --timeout 120000
    - name: Run E2E tests
      run: |
        npm install playwright core-js
        npx playwright install --with-deps chromium
        node tests/test_pw.js
    # Sans cette capture, un conteneur qui meurt au démarrage (ex. build llama.cpp
    # cassé) est indiagnosticable : `down` supprime les conteneurs et leurs logs.
    - name: Dump container logs (on failure)
      if: failure()
      run: |
        docker compose --project-directory . -f deploy/docker/docker-compose.yml ps -a
        docker compose --project-directory . -f deploy/docker/docker-compose.yml logs --no-color --tail=200
    - name: Stop services
      if: always()
      run: docker compose --project-directory . -f deploy/docker/docker-compose.yml down

  python-services:
    name: Python service (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [docparser, reranker]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: services/requirements-test.txt
    - name: Install test dependencies
      run: pip install -r services/requirements-test.txt
    - name: Lint (Ruff)
      run: ruff check services/${{ matrix.service }}
    - name: Unit tests (pytest)
      run: (cd services/${{ matrix.service }} && python -m pytest tests/ -q --cov=app --cov-report=xml)
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.service }}-coverage
        path: services/${{ matrix.service }}/coverage.xml

  codecov:
    name: Upload coverage to Codecov
    needs: [build, frontend, python-services]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Jacoco report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: jacoco

      - name: Download Vitest coverage report
        uses: actions/download-artifact@v4
        with:
          name: vitest-coverage-report
          path: vitest

      - name: Download docparser coverage report
        uses: actions/download-artifact@v4
        with:
          name: docparser-coverage
          path: docparser

      - name: Download reranker coverage report
        uses: actions/download-artifact@v4
        with:
          name: reranker-coverage
          path: reranker

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: jacoco/jacoco.xml,vitest/lcov.info,docparser/coverage.xml,reranker/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
