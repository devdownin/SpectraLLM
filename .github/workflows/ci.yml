name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and Test with Maven
      run: mvn -B package -f backend/pom.xml
    - name: Upload Jacoco Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: backend/target/site/jacoco/jacoco.xml

  static-analysis:
    name: Static analysis (SpotBugs)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    # SpotBugs + find-sec-bugs, restricted to a curated high-confidence rule set
    # (see spotbugs-include.xml) plus all security findings. Runs off the default
    # build via the `static-analysis` profile so `mvn package` stays fast.
    - name: SpotBugs check
      run: mvn -B -Pstatic-analysis -DskipTests compile spotbugs:check -f backend/pom.xml
    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: backend/target/spotbugs*
        if-no-files-found: ignore

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint (ESLint)
      run: npm run lint
    - name: Unit tests (Vitest)
      run: npm run test:coverage
    - name: Upload Vitest Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: vitest-coverage-report
        path: frontend/coverage/lcov.info
    - name: Build (tsc + vite)
      run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Compose
      run: |
        docker compose --project-directory . -f deploy/docker/docker-compose.yml build
        docker compose --project-directory . -f deploy/docker/docker-compose.yml up -d
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Wait for services to be ready
      run: |
        npm install -g wait-on
        wait-on http://localhost:80 http://localhost:8080/actuator/health --timeout 120000
    - name: Run E2E tests
      run: |
        npm install playwright core-js
        npx playwright install --with-deps chromium
        node tests/test_pw.js
    - name: Stop services
      if: always()
      run: docker compose --project-directory . -f deploy/docker/docker-compose.yml down

  python-services:
    name: Python services (docparser, reranker)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: services/requirements-test.txt
    - name: Install test dependencies
      run: pip install -r services/requirements-test.txt
    - name: Lint (Ruff)
      run: ruff check services/docparser services/reranker
    - name: Unit tests (pytest)
      run: |
        (cd services/docparser && python -m pytest tests/ -q --cov=app --cov-report=xml)
        (cd services/reranker && python -m pytest tests/ -q --cov=app --cov-report=xml)
    - name: Upload docparser coverage
      uses: actions/upload-artifact@v4
      with:
        name: docparser-coverage
        path: services/docparser/coverage.xml
    - name: Upload reranker coverage
      uses: actions/upload-artifact@v4
      with:
        name: reranker-coverage
        path: services/reranker/coverage.xml

  codecov:
    name: Upload coverage to Codecov
    needs: [build, frontend, python-services]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Jacoco report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: jacoco

      - name: Download Vitest coverage report
        uses: actions/download-artifact@v4
        with:
          name: vitest-coverage-report
          path: vitest

      - name: Download docparser coverage report
        uses: actions/download-artifact@v4
        with:
          name: docparser-coverage
          path: docparser

      - name: Download reranker coverage report
        uses: actions/download-artifact@v4
        with:
          name: reranker-coverage
          path: reranker

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: jacoco/jacoco.xml,vitest/lcov.info,services/docparser/coverage.xml,services/reranker/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
