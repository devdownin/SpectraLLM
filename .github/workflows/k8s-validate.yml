name: Validate k8s manifests

# Valide que les manifestes Kubernetes (base + overlays) se construisent avec
# kustomize et respectent les schémas Kubernetes (kubeconform). Purement
# statique : ne se connecte à aucun cluster.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'deploy/k8s/**'
      - '.github/workflows/k8s-validate.yml'
  push:
    branches: [ "main", "master" ]
    paths:
      - 'deploy/k8s/**'

jobs:
  validate:
    name: kustomize build + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize et kubeconform (versions épinglées)
        env:
          # Versions figées : la CI doit être reproductible. Installer kustomize « latest »
          # depuis master (ou utiliser la version pré-installée du runner, elle aussi
          # flottante) fait dériver la validation dans le temps — un nouveau kustomize peut
          # casser un manifeste valide, ou en laisser passer un cassé, sans aucun changement
          # dans le dépôt. Même philosophie que le pin de LLAMA_CPP_IMAGE_TAG.
          KUSTOMIZE_VERSION: v5.8.1
          KUBECONFORM_VERSION: v0.6.7
        run: |
          set -euo pipefail
          curl -sSLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version
          curl -sSLo kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Build & validate base (deploy/k8s/base/)
        run: |
          set -euo pipefail
          kustomize build deploy/k8s/base/ > /tmp/base.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/base.yaml

      - name: Build & validate GPU overlay (deploy/k8s/overlays/gpu)
        run: |
          set -euo pipefail
          kustomize build deploy/k8s/overlays/gpu/ > /tmp/gpu.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/gpu.yaml

      - name: Build & validate GKE ingress overlay (deploy/k8s/overlays/gke)
        run: |
          set -euo pipefail
          kustomize build deploy/k8s/overlays/gke/ > /tmp/gke.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/gke.yaml

      - name: Build & validate model-seed (deploy/k8s/seed)
        run: |
          set -euo pipefail
          kustomize build deploy/k8s/seed/ > /tmp/seed.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/seed.yaml

      - name: Build & validate monitoring (deploy/k8s/monitoring)
        run: |
          set -euo pipefail
          kustomize build deploy/k8s/monitoring/ > /tmp/monitoring.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/monitoring.yaml
