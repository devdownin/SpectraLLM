name: Dependency Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java and Maven
        uses: ./.github/actions/setup-java-maven
      # Sans NVD_API_KEY, le téléchargement complet de la base NVD depuis les runners
      # partagés se fait régulièrement limiter (HTTP 429) après plusieurs heures.
      # On met la base en cache entre les runs : chaque passage ne télécharge que le
      # delta, et la sauvegarde en `if: always()` conserve les données partielles
      # d'un run échoué au lieu de repartir de zéro.
      # run_attempt dans la clé : les caches Actions sont immuables, et un rerun du même
      # run réutilise run_id — sans l'attempt, la sauvegarde du rerun échoue
      # (« Unable to reserve cache ») et sa progression est perdue.
      - name: Restore OWASP dependency-check database
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: depcheck-data-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            depcheck-data-${{ runner.os }}-
      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY || '' }}
        run: if [ -z "${NVD_API_KEY}" ]; then mvn -Pdep-check verify -DskipTests -f backend/pom.xml; else mvn -Pdep-check verify -DskipTests -DnvdApiKey="${NVD_API_KEY}" -f backend/pom.xml; fi
      - name: Save OWASP dependency-check database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: depcheck-data-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          if-no-files-found: ignore
