# Règles d'alerte Prometheus pour spectra-api.
# Métriques exposées par Micrometer (tag commun application="spectrallm") :
#   http_server_requests_seconds_*   — latence/volume HTTP (+ histogramme → quantiles)
#   spectra_rag_query_seconds_*      — latence du traitement RAG (@Timed, histogramme)
#   jvm_memory_used_bytes / max      — heap JVM
#   spectra_consistency_*            — réconciliation horaire H2/ChromaDB/BM25 (par collection)
#
# Le label `release` doit matcher le ruleSelector de votre Prometheus Operator.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: spectra-api
  namespace: spectra
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: spectra-api.rules
      rules:
        - alert: SpectraApiDown
          expr: up{job="spectra-api"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "spectra-api injoignable"
            description: "La cible spectra-api ne répond plus au scrape depuis 2 min."

        - alert: SpectraHighHttp5xxRate
          expr: |
            sum(rate(http_server_requests_seconds_count{application="spectrallm", status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="spectrallm"}[5m]))
            > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Taux d'erreurs 5xx élevé (>5%)"
            description: "Plus de 5% des requêtes HTTP renvoient un statut 5xx sur 5 min."

        - alert: SpectraHighRagLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(spectra_rag_query_seconds_bucket{application="spectrallm"}[5m])) by (le)
            ) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Latence RAG p95 élevée (>10s)"
            description: "Le 95e percentile du traitement RAG dépasse 10s sur 10 min."

        - alert: SpectraJvmHeapHigh
          expr: |
            sum(jvm_memory_used_bytes{application="spectrallm", area="heap"})
            /
            sum(jvm_memory_max_bytes{application="spectrallm", area="heap"})
            > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Heap JVM > 90%"
            description: "La heap JVM de spectra-api dépasse 90% de sa taille max depuis 10 min (risque d'OOM / GC pressure)."

        # Divergence FTS/ChromaDB par collection : les index vectoriel et BM25 ne comptent
        # pas le même nombre de chunks. La réconciliation horaire tente déjà une réparation
        # automatique (rebuild BM25 depuis ChromaDB) — une divergence qui PERSISTE plus de
        # 2h signifie que la réparation échoue en boucle (ChromaDB instable, flush FTS
        # perdu répété…) : les réponses hybrides peuvent citer des chunks fantômes ou en
        # manquer. `for: 2h` couvre au moins deux cycles de réconciliation.
        - alert: SpectraIndexDivergence
          expr: spectra_consistency_collection_fts_chroma_divergence{application="spectrallm"} > 0
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: "Index FTS/ChromaDB divergents ({{ $labels.collection }})"
            description: "La collection {{ $labels.collection }} présente un écart de {{ $value }} chunks entre ChromaDB et l'index BM25 depuis plus de 2h — la réparation automatique (rebuild horaire) ne converge pas."

        # ChromaDB vide alors que la GED déclare des chunks : perte du volume ChromaDB ou
        # reset du conteneur — le RAG répond « je ne sais pas » sur tout le corpus alors
        # que la GED semble saine. (dbChunks vaut -1 tant que la 1re réconciliation n'a
        # pas tourné : la condition > 0 évite les faux positifs au démarrage.)
        - alert: SpectraChromaEmptyButGedPopulated
          expr: |
            spectra_consistency_chroma_chunks{application="spectrallm"} == 0
            and
            spectra_consistency_db_chunks{application="spectrallm"} > 0
          for: 2h
          labels:
            severity: critical
          annotations:
            summary: "ChromaDB vide alors que la GED déclare des documents"
            description: "La collection par défaut ne contient aucun chunk alors que la GED déclare des documents ingérés — volume ChromaDB perdu ou reset : restaurez le volume ou ré-ingérez le corpus."

        - alert: SpectraCircuitBreakerOpen
          expr: resilience4j_circuitbreaker_state{application="spectrallm", state="open"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Circuit Breaker {{ $labels.name }} est ouvert"
            description: "Le Circuit Breaker {{ $labels.name }} est en état 'open' depuis plus de 5 minutes, indiquant une défaillance persistante."

        - alert: SpectraHighErrorLogs
          expr: sum(rate(logback_events_total{application="spectrallm", level="error"}[5m])) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Taux élevé de logs en erreur"
            description: "L'application génère plus de 10 logs d'erreur par seconde en moyenne sur les 5 dernières minutes."

        - alert: SpectraHighGCOverhead
          expr: rate(jvm_gc_pause_seconds_sum{application="spectrallm"}[5m]) / rate(jvm_gc_pause_seconds_count{application="spectrallm"}[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Sur-utilisation du Garbage Collector"
            description: "Le temps de pause moyen du GC dépasse 0.5s par cycle sur les 5 dernières minutes (pression mémoire anormale)."
