# Dashboard Grafana pour SpectraLLM.
# Le label grafana_dashboard="1" est détecté par le sidecar Grafana de
# kube-prometheus-stack, qui importe automatiquement le JSON. Pour un Grafana
# autre, importer manuellement spectra-dashboard.json (Dashboards → Import).
#
# La source de données est paramétrée (variable "datasource") → fonctionne quel
# que soit l'uid du Prometheus dans votre Grafana.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spectra-grafana-dashboard
  namespace: spectra
  labels:
    grafana_dashboard: "1"
data:
  spectra-dashboard.json: |
    {
      "title": "SpectraLLM — API & RAG",
      "uid": "spectrallm-api",
      "tags": ["spectra", "rag"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Débit HTTP (req/s) par statut",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"spectrallm\"}[5m])) by (status)",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Latence HTTP p95 (s)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"spectrallm\"}[5m])) by (le, uri))",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Taux d'erreurs 5xx (%)",
          "type": "stat",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"spectrallm\", status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{application=\"spectrallm\"}[5m])), 1e-9)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Latence RAG p95 (s)",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(spectra_rag_query_seconds_bucket{application=\"spectrallm\"}[5m])) by (le))",
              "legendFormat": "RAG p95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Heap JVM utilisée / max",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"spectrallm\", area=\"heap\"})",
              "legendFormat": "used",
              "refId": "A"
            },
            {
              "expr": "sum(jvm_memory_max_bytes{application=\"spectrallm\", area=\"heap\"})",
              "legendFormat": "max",
              "refId": "B"
            }
          ]
        },
        {
          "id": 6,
          "title": "Cohérence des index — chunks par magasin",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "expr": "spectra_consistency_chroma_chunks{application=\"spectrallm\"}",
              "legendFormat": "ChromaDB (défaut)",
              "refId": "A"
            },
            {
              "expr": "spectra_consistency_fts_chunks{application=\"spectrallm\"}",
              "legendFormat": "BM25 (défaut)",
              "refId": "B"
            },
            {
              "expr": "spectra_consistency_db_chunks{application=\"spectrallm\"}",
              "legendFormat": "GED (H2)",
              "refId": "C"
            }
          ]
        },
        {
          "id": 7,
          "title": "Divergence FTS/ChromaDB par collection",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "expr": "spectra_consistency_collection_fts_chroma_divergence{application=\"spectrallm\"}",
              "legendFormat": "{{collection}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
