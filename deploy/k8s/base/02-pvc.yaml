# ─────────────────────────────────────────────────────────────────────────────
# Persistent Volume Claims
#
# IMPORTANT — mode d'accès :
#   ReadWriteOnce (RWO) convient pour un cluster mono-nœud ou si tous les pods
#   qui partagent un volume sont schedulés sur le même nœud.
#
#   Pour un cluster multi-nœuds, le PVC `models` — partagé par spectra-api (RW),
#   llama-cpp-embed (RO) ET llama-cpp-chat (RO, via le superviseur qui suit le
#   modèle actif) — nécessite ReadWriteMany (RWX) via une StorageClass NFS, CephFS,
#   AWS EFS, Azure Files, etc. Sinon ces trois pods doivent être schedulés sur le
#   même nœud. `fine-tuning` n'est plus monté que par spectra-api.
#
#   Remplacer storageClassName par le nom de votre StorageClass :
#     - standard      (minikube / kind)
#     - gp2 / gp3     (AWS EKS)
#     - managed-csi   (Azure AKS)
#     - standard-rwo  (GKE)
# ─────────────────────────────────────────────────────────────────────────────

# Documents uploadés (écriture par spectra-api uniquement)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spectra-documents-pvc
  namespace: spectra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
# Paires d'entraînement générées
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spectra-dataset-pvc
  namespace: spectra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
# Adaptateurs LoRA, datasets et jobs de fine-tuning — écrit par spectra-api. Les modèles
# fine-tunés exportés (GGUF) sont copiés dans le volume `models` pour être servis ; ce PVC
# n'est donc plus monté par llama-cpp-chat.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spectra-fine-tuning-pvc
  namespace: spectra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi

---
# Modèles GGUF + registry.json + pointeur active-chat-model — partagé par spectra-api (RW),
# llama-cpp-embed (RO) et llama-cpp-chat (RO). C'est la source de vérité du modèle servi :
# le superviseur llm-chat y lit le modèle actif. RWX requis en multi-nœuds (cf. en-tête).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spectra-models-pvc
  namespace: spectra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
# Base vectorielle ChromaDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
  namespace: spectra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
