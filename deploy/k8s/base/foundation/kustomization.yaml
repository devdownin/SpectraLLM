apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Socle partagé (namespace + PVC), factorisé pour être référençable par PLUSIEURS
# kustomizations : la stack complète (../) et le seeding des modèles (../../seed).
# Kustomize interdit de référencer un FICHIER hors de la racine d'une kustomization
# (load restrictions — le build de seed échouait), mais autorise un RÉPERTOIRE
# portant sa propre kustomization : c'est exactement ce module.
resources:
  - 00-namespace.yaml
  - 02-pvc.yaml
