apiVersion: v1
kind: ConfigMap
metadata:
  name: spectra-api-config
  namespace: spectra
data:
  # Provider LLM
  SPECTRA_LLM_PROVIDER: "llama-cpp"
  SPECTRA_LLM_RUNTIME_ENABLED: "false"
  SPECTRA_LLM_REGISTRY_PATH: "/app/data/models/registry.json"

  # Endpoints internes (noms de services K8s dans le même namespace)
  SPECTRA_LLM_CHAT_BASE_URL: "http://llama-cpp-chat:8080"
  SPECTRA_LLM_MODEL: "spectra-domain"
  SPECTRA_LLM_EMBEDDING_BASE_URL: "http://llama-cpp-embed:8080"
  SPECTRA_LLM_EMBEDDING_MODEL: "nomic-embed-text"
  # Fichiers GGUF réellement servis (dans le volume des modèles, à côté du registre).
  # Ils donnent au registre la SOURCE des modèles par défaut, pour que le pointeur
  # active-chat-model (lu par le superviseur llm-chat) désigne un fichier servable dès
  # le 1er boot — sinon « modèle actif ≠ modèle servi ». DOIVENT correspondre aux noms
  # seedés dans le volume des modèles (k8s/seed) et au repli LLM_CHAT_MODEL_FILE ci-dessous.
  SPECTRA_LLM_CHAT_FILE: "Phi-4-mini-reasoning-UD-IQ1_S.gguf"
  SPECTRA_LLM_EMBEDDING_FILE: "embed.gguf"
  SPECTRA_CHROMADB_BASE_URL: "http://chromadb:8000"
  SPECTRA_INGESTION_BROWSERLESS_URL: "http://browserless:3000"

  # Performances
  SPECTRA_GENERATE_TIMEOUT_MINUTES: "10"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-chat-config
  namespace: spectra
data:
  # Le pod chat lance le SUPERVISEUR (scripts/llm-chat-entrypoint.sh) : il sert le
  # modèle de chat ACTIF du registre (pointeur /models/active-chat-model écrit par
  # spectra-api) et redémarre llama-server à chaud quand il change (POST /api/config/model,
  # activation post-fine-tuning, installation llmfit auto-activée). Résout « modèle actif ≠
  # modèle servi » en k8s, comme en docker-compose.
  MODELS_DIR: "/models"
  LLM_PORT: "8080"                                     # aligné sur le Service et les probes
  # Repli tant que le pointeur du registre n'existe pas (1er boot) : DOIVENT correspondre
  # au fichier seedé dans le volume des modèles et à SPECTRA_LLM_CHAT_FILE / SPECTRA_LLM_MODEL.
  LLM_CHAT_MODEL_FILE: "Phi-4-mini-reasoning-UD-IQ1_S.gguf"
  LLM_CHAT_MODEL_NAME: "spectra-domain"
  # Vide = le superviseur applique les hints calculés par spectra-api
  # (/models/active-chat-params), sinon ses défauts intégrés. Une valeur impose l'override.
  LLM_CONTEXT: ""
  LLM_THREADS: ""
  LLM_BATCH: ""
  LLM_PARALLEL: "1"
  LLM_CHAT_WATCH_INTERVAL: "10"                        # période de surveillance du pointeur (s)
  # Arguments supplémentaires passés tels quels à llama-server. GPU : "--n-gpu-layers 999"
  # (voir overlay k8s/overlays/gpu). Vide = CPU.
  LLM_CHAT_EXTRA_ARGS: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-embed-config
  namespace: spectra
data:
  MODEL_PATH: "/models/embed.gguf"
  MODEL_ALIAS: "nomic-embed-text"
  LLAMA_MODE: "embed"
  LLAMA_CONTEXT: "1024"
  LLAMA_THREADS: ""
  LLAMA_BATCH: "2048"
  LLAMA_NGL: "0"
  LLAMA_FLASH_ATTN: "0"
  LLAMA_CACHE_TYPE_K: "f16"
  LLAMA_CACHE_TYPE_V: "f16"
  # Slots parallèles côté serveur d'embedding : accélère l'ingestion (les lots
  # d'embeddings sont traités en parallèle au lieu d'être sérialisés). Aligné sur
  # docker-compose (--parallel 4). Bénéfique même en CPU.
  LLAMA_PARALLELISM: "4"

---
# Secret pour les valeurs sensibles
# Encoder en base64 : echo -n "ma-cle-api" | base64
apiVersion: v1
kind: Secret
metadata:
  name: spectra-secrets
  namespace: spectra
type: Opaque
stringData:
  # Laisser vide pour désactiver l'authentification API
  SPECTRA_API_KEY: ""
