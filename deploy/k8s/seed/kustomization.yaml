apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: spectra

# Namespace + PVC (module partagé de la base) + Job de seeding, dans cet ordre.
# `kubectl apply -k deploy/k8s/seed` crée les volumes vides puis lance le téléchargement.
# NB : on référence le RÉPERTOIRE ../base/foundation (kustomization propre) — référencer
# les fichiers ../base/*.yaml directement viole les load restrictions de kustomize.
resources:
  - ../base/foundation
  - seed-models.yaml
