# Override pour activer l'accélération GPU NVIDIA (CUDA).
# Usage : docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# Les paramètres -c/-b respectent le .env généré par detect-env.sh (LLM_CONTEXT),
# avec les mêmes défauts que docker-compose.yml.
services:
  # llm-chat garde l'entrypoint superviseur du compose de base (modèle actif du
  # registre) : seuls l'image CUDA et l'offload GPU sont ajoutés ici.
  llm-chat:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    environment:
      - LLM_CHAT_EXTRA_ARGS=--n-gpu-layers 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llm-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    environment:
      - LLM_EMBED_EXTRA_ARGS=--n-gpu-layers 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
