services:

  # ── Serveur LLM — Chat ────────────────────────────────────────────────────
  # Entrypoint superviseur : sert le modèle de chat ACTIF du registre Spectra
  # (pointeur /models/active-chat-model écrit par spectra-api) et redémarre
  # llama-server automatiquement quand il change (POST /api/config/model,
  # activation post-fine-tuning) — plus de « restart llm-chat » manuel.
  # Repli sur LLM_CHAT_MODEL_FILE tant que le pointeur n'existe pas (1er boot).
  # Image ÉPINGLÉE sur un build versionné : le tag mobile « server » est reconstruit
  # en continu depuis le master de llama.cpp (plusieurs fois par jour) — un build
  # cassé faisait mourir les conteneurs au démarrage (constaté en CI E2E) alors que
  # les machines locales tournaient sur un vieux pull en cache. Surcharge possible
  # via LLAMA_CPP_IMAGE_TAG (ex. server-b9976, ou server pour suivre master).
  llm-chat:
    image: ghcr.io/ggml-org/llama.cpp:${LLAMA_CPP_IMAGE_TAG:-server-b9828}
    container_name: spectra-llm-chat
    ports:
      - "8081:8081"
    volumes:
      - ./data/models:/models
      - ./scripts/llm-chat-entrypoint.sh:/llm-chat-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/llm-chat-entrypoint.sh"]
    environment:
      - LLM_CHAT_MODEL_FILE=${LLM_CHAT_MODEL_FILE:-Phi-4-mini-reasoning-UD-IQ1_S.gguf}
      - LLM_CHAT_MODEL_NAME=${LLM_CHAT_MODEL_NAME:-phi-4-mini}
      - LLM_PORT=8081
      # Pass-through SANS défaut : vide = l'entrypoint applique les hints calculés
      # par spectra-api (/models/active-chat-params), sinon ses défauts intégrés.
      # Définir la variable dans .env impose la valeur (priorité utilisateur).
      - LLM_CONTEXT=${LLM_CONTEXT:-}
      - LLM_THREADS=${LLM_THREADS:-}
      - LLM_BATCH=${LLM_BATCH:-}
      - LLM_PARALLEL=${LLM_PARALLEL:-2}
      - LLM_CHAT_WATCH_INTERVAL=${LLM_CHAT_WATCH_INTERVAL:-10}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── Serveur LLM — Embedding ───────────────────────────────────────────────
  llm-embed:
    # Même épinglage que llm-chat (tag mobile « server » = risque de casse silencieuse).
    image: ghcr.io/ggml-org/llama.cpp:${LLAMA_CPP_IMAGE_TAG:-server-b9828}
    container_name: spectra-llm-embed
    ports:
      - "8082:8082"
    volumes:
      - ./data/models:/models
      - ./scripts/llm-embed-entrypoint.sh:/llm-embed-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/llm-embed-entrypoint.sh"]
    environment:
      - LLM_EMBED_MODEL_FILE=${LLM_EMBED_MODEL_FILE:-embed.gguf}
      - LLM_EMBED_PARALLEL=${LLM_EMBED_PARALLEL:-4}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ── ChromaDB ──────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: spectra-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_OTEL_EXPORTER_OTLP_ENDPOINT=
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Parser de documents (optionnel, profil layout-parser) ─────────────────
  docparser:
    profiles: [layout-parser]
    build:
      context: ./services/docparser
      dockerfile: Dockerfile
      args:
        USE_DOCLING: ${USE_DOCLING:-false}
    container_name: spectra-docparser
    deploy:
      resources:
        limits:
          memory: 2gb
    ports:
      - "8003:8001"
    environment:
      - USE_DOCLING=${USE_DOCLING:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Reranker (optionnel, profil reranker) ─────────────────────────────────
  reranker:
    profiles: [reranker]
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
      args:
        RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
    container_name: spectra-reranker
    ports:
      - "8002:8000"
    volumes:
      - reranker-model-cache:/root/.cache/huggingface
    environment:
      - RERANKER_MODEL=${RERANKER_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Kafka (optionnel, profil kafka) ───────────────────────────────────────
  # Broker mono-nœud en mode KRaft (sans Zookeeper), pour l'ingestion streaming.
  # Définition IDENTIQUE au broker embarqué dans le docker-compose du projet
  # Kafka Explorer (apache/kafka:4.2.0, même CLUSTER_ID, mêmes listeners, même
  # volume persistant `kafka_data`) : les deux stacks partagent ainsi exactement
  # le même broker et sont interchangeables. Deux listeners : `kafka:29092` pour
  # les services du réseau compose (dont spectra-api) et `localhost:9092` pour
  # produire des messages depuis l'hôte.
  kafka:
    profiles: [kafka]
    image: apache/kafka:4.2.0
    container_name: spectra-kafka
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 15s
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Single-node dev: 1 __consumer_offsets partition instead of the default 50
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Share groups (KIP-932, Kafka 4.1+) state topic on a single node
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      # Topics d'ingestion auto-créés au premier write
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Fixed KRaft cluster id — the apache/kafka image reads CLUSTER_ID
      # (KAFKA_CLUSTER_ID would be passed to server.properties and ignored)
      CLUSTER_ID: "MkU2OhlMTT69sPFvS1n16g"
      # Persist data & metadata logs across restarts — KRaft re-uses the storage
      # formatted with the fixed CLUSTER_ID above. `docker compose down -v` resets.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      kafka-data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # The apache/kafka image runs as the non-root `appuser`, but Docker creates a
  # fresh named volume owned by root — chown it once before the broker starts.
  # (même service d'init que dans le docker-compose de Kafka Explorer.)
  kafka-data-init:
    profiles: [kafka]
    image: apache/kafka:4.2.0
    user: root
    volumes:
      - kafka_data:/var/lib/kafka/data
    entrypoint: ["sh", "-c", "chown -R appuser:appuser /var/lib/kafka/data"]

  # ── API Backend ───────────────────────────────────────────────────────────
  spectra-api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: spectra-api
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx1024m -XX:+UseZGC}
      # Provider LLM : llama-cpp (deux serveurs dédiés chat + embed)
      - SPECTRA_LLM_PROVIDER=llama-cpp
      - SPECTRA_LLM_CHAT_BASE_URL=http://llm-chat:8081
      - SPECTRA_LLM_EMBEDDING_BASE_URL=http://llm-embed:8082
      - SPECTRA_LLM_MODEL=${LLM_CHAT_MODEL_NAME:-phi-4-mini}
      - SPECTRA_LLM_EMBEDDING_MODEL=${LLM_EMBED_MODEL_NAME:-nomic-embed-text}
      # Fichiers GGUF réellement servis (mêmes variables que llm-chat/llm-embed) :
      # le registre local associe ainsi les modèles par défaut à leur source servable.
      - SPECTRA_LLM_CHAT_FILE=${LLM_CHAT_MODEL_FILE:-Phi-4-mini-reasoning-UD-IQ1_S.gguf}
      - SPECTRA_LLM_EMBEDDING_FILE=${LLM_EMBED_MODEL_FILE:-embed.gguf}
      - SPECTRA_CHROMADB_BASE_URL=http://chromadb:8000
      - SPECTRA_PIPELINE_CHUNK_MAX_TOKENS=${SPECTRA_CHUNK_MAX_TOKENS:-256}
      - SPECTRA_PIPELINE_CHUNK_OVERLAP_TOKENS=${SPECTRA_CHUNK_OVERLAP_TOKENS:-64}
      - SPECTRA_PIPELINE_EMBEDDING_BATCH_SIZE=${SPECTRA_EMBEDDING_BATCH_SIZE:-10}
      - SPECTRA_PIPELINE_EMBEDDING_TIMEOUT_SECONDS=${SPECTRA_EMBEDDING_TIMEOUT:-30}
      - SPECTRA_PIPELINE_GENERATION_TIMEOUT_SECONDS=${SPECTRA_GENERATION_TIMEOUT:-120}
      - SPECTRA_PIPELINE_CONCURRENT_INGESTIONS=${SPECTRA_CONCURRENT_INGESTIONS:-4}
      - SPECTRA_RERANKER_ENABLED=${SPECTRA_RERANKER_ENABLED:-false}
      - SPECTRA_RERANKER_URL=http://reranker:8000
      - SPECTRA_RERANKER_MODEL=${RERANKER_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      - SPECTRA_RERANKER_TOP_CANDIDATES=${SPECTRA_RERANKER_TOP_CANDIDATES:-20}
      - SPECTRA_LAYOUT_PARSER_ENABLED=${SPECTRA_LAYOUT_PARSER_ENABLED:-false}
      - SPECTRA_LAYOUT_PARSER_URL=http://docparser:8001
      - SPECTRA_LAYOUT_PARSER_TIMEOUT=${SPECTRA_LAYOUT_PARSER_TIMEOUT:-120}
      - SPECTRA_AGENTIC_RAG_ENABLED=${SPECTRA_AGENTIC_RAG_ENABLED:-false}
      - SPECTRA_AGENTIC_MAX_ITERATIONS=${SPECTRA_AGENTIC_MAX_ITERATIONS:-3}
      - SPECTRA_AGENTIC_INITIAL_TOP_K=${SPECTRA_AGENTIC_INITIAL_TOP_K:-5}
      - SPECTRA_AGENTIC_LANGUAGE=${SPECTRA_AGENTIC_LANGUAGE:-fr}
      - SPECTRA_AGENTIC_MAX_CONTEXT_TOKENS=${SPECTRA_AGENTIC_MAX_CONTEXT_TOKENS:-3000}
      - SPECTRA_HYBRID_SEARCH_ENABLED=${SPECTRA_HYBRID_SEARCH_ENABLED:-false}
      - SPECTRA_HYBRID_BM25_TOP=${SPECTRA_HYBRID_BM25_TOP:-20}
      - SPECTRA_HYBRID_BM25_WEIGHT=${SPECTRA_HYBRID_BM25_WEIGHT:-1.0}
      # ── RAG avancé (nouvelles stratégies) ──────────────────────────────────────
      - SPECTRA_CONVERSATIONAL_RAG_ENABLED=${SPECTRA_CONVERSATIONAL_RAG_ENABLED:-false}
      - SPECTRA_CORRECTIVE_RAG_ENABLED=${SPECTRA_CORRECTIVE_RAG_ENABLED:-false}
      - SPECTRA_CORRECTIVE_MIN_RELEVANT_CHUNKS=${SPECTRA_CORRECTIVE_MIN_RELEVANT_CHUNKS:-1}
      - SPECTRA_ADAPTIVE_RAG_ENABLED=${SPECTRA_ADAPTIVE_RAG_ENABLED:-false}
      - SPECTRA_SELF_RAG_ENABLED=${SPECTRA_SELF_RAG_ENABLED:-false}
      - SPECTRA_SELF_RAG_MAX_REFLECTIONS=${SPECTRA_SELF_RAG_MAX_REFLECTIONS:-1}
      # ── Ingestion streaming Kafka (profil kafka + SPECTRA_KAFKA_ENABLED=true) ────
      - SPECTRA_KAFKA_ENABLED=${SPECTRA_KAFKA_ENABLED:-false}
      - SPECTRA_KAFKA_BOOTSTRAP_SERVERS=${SPECTRA_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - SPECTRA_KAFKA_TOPICS=${SPECTRA_KAFKA_TOPICS:-}
      - SPECTRA_KAFKA_GROUP_ID=${SPECTRA_KAFKA_GROUP_ID:-spectra-ingestion}
      - SPECTRA_KAFKA_COLLECTION=${SPECTRA_KAFKA_COLLECTION:-spectra_stream}
      - SPECTRA_KAFKA_FORMAT=${SPECTRA_KAFKA_FORMAT:-json}
      - SPECTRA_KAFKA_CONTENT_FIELD=${SPECTRA_KAFKA_CONTENT_FIELD:-}
      - SPECTRA_KAFKA_METADATA_FIELDS=${SPECTRA_KAFKA_METADATA_FIELDS:-}
      - SPECTRA_KAFKA_CONCURRENCY=${SPECTRA_KAFKA_CONCURRENCY:-1}
      - SPECTRA_KAFKA_MAX_POLL_RECORDS=${SPECTRA_KAFKA_MAX_POLL_RECORDS:-20}
      - SPECTRA_KAFKA_RETENTION_TTL_DAYS=${SPECTRA_KAFKA_RETENTION_TTL_DAYS:-0}
      - SPECTRA_KAFKA_SECURITY_PROTOCOL=${SPECTRA_KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - SPECTRA_KAFKA_SASL_MECHANISM=${SPECTRA_KAFKA_SASL_MECHANISM:-}
      - SPECTRA_KAFKA_SASL_JAAS_CONFIG=${SPECTRA_KAFKA_SASL_JAAS_CONFIG:-}
      # ── Model Hub (llmfit) : cache de téléchargement + rétention historique ─────
      # Le cache llmfit vit dans le home de l'utilisateur du conteneur (spectra).
      # Inventorié par le rapport de stockage, purgeable de ses doublons.
      - LLMFIT_CACHE_DIR=${LLMFIT_CACHE_DIR:-/home/spectra/.llmfit}
      - LLMFIT_INSTALL_RETENTION_DAYS=${LLMFIT_INSTALL_RETENTION_DAYS:-0}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/readiness"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Nginx + React) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spectra-frontend
    ports:
      - "80:80"
    depends_on:
      spectra-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  chromadb-data:
  reranker-model-cache:
  # Nom aligné sur le volume du broker Kafka Explorer pour un broker identique.
  kafka_data:
